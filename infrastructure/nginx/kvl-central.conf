# KVL Central — Nginx Wildcard Subdomain Config
# Place at: /etc/nginx/sites-available/kvl-central.conf
# Enable: ln -s /etc/nginx/sites-available/kvl-central.conf /etc/nginx/sites-enabled/

# Upstream: Next.js app
upstream kvl_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kvl-central.com *.kvl-central.com;
    return 301 https://$host$request_uri;
}

# ── Main domain: kvl-central.com ──────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kvl-central.com;

    ssl_certificate     /etc/letsencrypt/live/kvl-central.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kvl-central.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://kvl_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Wildcard subdomains: *.kvl-central.com ────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name *.kvl-central.com;

    # Wildcard cert (Let's Encrypt DNS challenge)
    ssl_certificate     /etc/letsencrypt/live/kvl-central.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kvl-central.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://kvl_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Custom client domains (e.g. shop.clientsite.com) ──────────────────
# Add new server block per custom domain, or use dynamic map:
# map $host $is_custom_tenant { default 0; shop.clientsite.com 1; }
